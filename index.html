<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lucasrajs studio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0A0A0A;
    --gray:  #1A1A1A;
    --mid:   #444;
    --white: #F5F2ED;
    --acid:  #00F5FF;
    --cyan:  #00F5FF;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 64px 20px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Scanline texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(255,255,255,0.012) 3px,
      rgba(255,255,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
  }

  /* LOGO */
  .logo-wrap {
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .wordmark .line1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(36px, 10vw, 52px);
    letter-spacing: -2px;
    line-height: 0.9;
    color: var(--white);
    display: block;
  }

  .wordmark .line2 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--acid);
    display: block;
    margin-top: 8px;
    margin-left: 2px;
  }

  /* DIVIDER */
  .divider {
    width: 100%;
    height: 1px;
    background: #1f1f1f;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.1s ease both;
    opacity: 0;
  }

  /* LINKS */
  .links {
    display: flex;
    flex-direction: column;
    gap: 2px;
    width: 100%;
  }

  .link-item {
    display: flex;
    align-items: center;
    text-decoration: none;
    color: var(--white);
    background: var(--gray);
    position: relative;
    overflow: hidden;
    transition: background 0.2s ease;
    animation: fadeUp 0.5s ease both;
    opacity: 0;
  }

  .link-item:nth-child(1) { animation-delay: 0.15s; }
  .link-item:nth-child(2) { animation-delay: 0.22s; }
  .link-item:nth-child(3) { animation-delay: 0.29s; }
  .link-item:nth-child(4) { animation-delay: 0.36s; }
  .link-item:nth-child(5) { animation-delay: 0.43s; }
  .link-item:nth-child(6) { animation-delay: 0.50s; }

  .link-item:hover { background: #222; }

  .link-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--acid);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.2s ease;
  }

  .link-item:hover::before { transform: scaleY(1); }

  .link-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(200,255,0,0.04) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }

  .link-item:hover::after { opacity: 1; }

  .link-index {
    width: 52px;
    flex-shrink: 0;
    padding: 20px 0 20px 20px;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--mid);
    align-self: stretch;
    display: flex;
    align-items: center;
    border-right: 1px solid #111;
  }

  .link-body {
    flex: 1;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .link-label {
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--mid);
    transition: color 0.2s ease;
  }

  .link-item:hover .link-label { color: var(--acid); }

  .link-value {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.3px;
    color: var(--white);
  }

  .link-arrow {
    width: 48px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--mid);
    font-size: 16px;
    font-family: 'Space Grotesk', sans-serif;
    transition: color 0.2s ease, transform 0.2s ease;
  }

  .link-item:hover .link-arrow {
    color: var(--acid);
    transform: translateX(3px);
  }

  /* FOOTER */
  .footer {
    margin-top: 32px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 20px;
    border-top: 1px solid #1a1a1a;
    animation: fadeUp 0.5s 0.6s ease both;
    opacity: 0;
  }

  .footer-copy {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mid);
  }

  .footer-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--acid);
    box-shadow: 0 0 8px var(--acid);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
